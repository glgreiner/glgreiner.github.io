name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------
      # Fix for ubuntu-24.04 runners (Ruby not preinstalled)
      # -----------------------------------------------------
      - name: Install Ruby manually if missing (ruby-build)
        run: |
          VERSION=3.1.4
          DEST="/opt/hostedtoolcache/Ruby/$VERSION/x64"

          # Only build Ruby if missing
          if [ ! -f "$DEST.complete" ]; then
            echo "Ruby $VERSION not found in toolcache. Installing with ruby-build..."

            sudo apt-get update -y
            sudo apt-get install -y build-essential libssl-dev libreadline-dev zlib1g-dev git

            # Install ruby-build if not present
            if ! command -v ruby-build >/dev/null; then
              git clone https://github.com/rbenv/ruby-build.git /tmp/ruby-build
              cd /tmp/ruby-build
              sudo ./install.sh
            fi

            # Ensure destination exists
            sudo mkdir -p "$DEST"

            # Avoid parallel builds of Ruby
            sudo flock /var/lock/ruby-build.lock -c "ruby-build $VERSION $DEST"

            sudo touch "$DEST.complete"
          else
            echo "Ruby already installed."
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@8575951200e472d5f2d95c625da0c7bec8217c42
        with:
          ruby-version: 3.1
          bundler-cache: true
          cache-version: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
